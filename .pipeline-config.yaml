---
version: "1"

# IBM One Pipeline configuration for PR Tracker
setup:
  image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.12@sha256:ff4053b0bca784d6d105fee1d008cfb20db206011453071e86b69ca3fde706a4
  script: |
    #!/usr/bin/env bash
    echo "Setting up build environment..."

build:
  image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.12@sha256:ff4053b0bca784d6d105fee1d008cfb20db206011453071e86b69ca3fde706a4
  script: |
    #!/usr/bin/env bash
    set -e

    echo "Building Docker image..."

    # Set image name and tag
    export IMAGE_NAME="${REGISTRY_URL}/${REGISTRY_NAMESPACE}/pr-tracker"
    export IMAGE_TAG="${GIT_COMMIT:0:7}"

    # Build the Docker image
    docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .
    docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:latest"

    echo "Image built: ${IMAGE_NAME}:${IMAGE_TAG}"

    # Save image info for next stages
    echo "${IMAGE_NAME}:${IMAGE_TAG}" > image-name.txt
    echo "${IMAGE_TAG}" > image-tag.txt

containerize:
  dind: true
  image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.12@sha256:ff4053b0bca784d6d105fee1d008cfb20db206011453071e86b69ca3fde706a4
  script: |
    #!/usr/bin/env bash
    set -e

    echo "Pushing Docker image to registry..."

    # Read image info
    export IMAGE_NAME=$(cat image-name.txt)
    export IMAGE_TAG=$(cat image-tag.txt)

    # Login to IBM Container Registry
    echo "${IBM_CLOUD_API_KEY}" | docker login -u iamapikey --password-stdin "${REGISTRY_URL}"

    # Push images
    docker push "${IMAGE_NAME}:${IMAGE_TAG}"
    docker push "${IMAGE_NAME}:latest"

    echo "Image pushed successfully"
    echo "Image: ${IMAGE_NAME}:${IMAGE_TAG}"

deploy:
  image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.12@sha256:ff4053b0bca784d6d105fee1d008cfb20db206011453071e86b69ca3fde706a4
  script: |
    #!/usr/bin/env bash
    set -e

    echo "Deploying to Kubernetes..."

    # Read image info
    export IMAGE_NAME=$(cat image-name.txt)
    export IMAGE_TAG=$(cat image-tag.txt)

    # Login to IBM Cloud
    ibmcloud login --apikey "${IBM_CLOUD_API_KEY}" -r "${IBM_CLOUD_REGION}"

    # Set Kubernetes cluster context
    ibmcloud ks cluster config --cluster "${CLUSTER_NAME}"

    # Create namespace if it doesn't exist
    kubectl create namespace pr-tracker --dry-run=client -o yaml | kubectl apply -f -

    # Apply Kubernetes manifests
    kubectl apply -f k8s/configmap.yaml -n pr-tracker
    kubectl apply -f k8s/secrets.yaml -n pr-tracker || echo "Secrets already exist or need manual creation"

    # Update deployment with new image
    kubectl set image deployment/pr-tracker pr-tracker="${IMAGE_NAME}:${IMAGE_TAG}" -n pr-tracker || \
      kubectl apply -f k8s/deployment.yaml -n pr-tracker

    kubectl apply -f k8s/service.yaml -n pr-tracker

    # Wait for rollout
    kubectl rollout status deployment/pr-tracker -n pr-tracker --timeout=5m

    echo "Deployment complete!"

    # Get service URL
    kubectl get service pr-tracker -n pr-tracker

test:
  abort_on_failure: false
  image: icr.io/continuous-delivery/pipeline/pipeline-base-image:2.12@sha256:ff4053b0bca784d6d105fee1d008cfb20db206011453071e86b69ca3fde706a4
  script: |
    #!/usr/bin/env bash
    set -e

    echo "Running health check..."

    # Get service endpoint
    SERVICE_URL=$(kubectl get service pr-tracker -n pr-tracker -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

    if [ -z "$SERVICE_URL" ]; then
      SERVICE_URL=$(kubectl get service pr-tracker -n pr-tracker -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
    fi

    if [ -z "$SERVICE_URL" ]; then
      echo "Warning: Could not determine service URL"
      exit 0
    fi

    # Wait for service to be ready
    sleep 30

    # Test health endpoint
    curl -f "http://${SERVICE_URL}:3000/health" || echo "Health check failed, but continuing..."

    echo "Tests complete"
